<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Hits Map</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #050b16;
      color: #d7e7ff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #AppWrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at center, rgba(20,40,80,0.35) 0%, rgba(5,11,22,1) 70%);
    }

    #WorldMap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.22;
      filter: brightness(0.9) contrast(1.1);
      pointer-events: none;
      user-select: none;
    }

    #MapCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #HudPanel {
      position: absolute;
      top: 18px;
      left: 18px;
      min-width: 280px;
      max-width: 420px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(5, 10, 20, 0.72);
      border: 1px solid rgba(110, 170, 255, 0.18);
      box-shadow: 0 0 18px rgba(0, 180, 255, 0.08);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #HudTitle {
      margin: 0 0 6px 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    #HudSubtitle {
      font-size: 12px;
      opacity: 0.82;
      margin-bottom: 10px;
    }

    #HudStats {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .HudCard {
      background: rgba(20, 40, 70, 0.32);
      border: 1px solid rgba(100, 160, 255, 0.14);
      border-radius: 10px;
      padding: 10px;
    }

    .HudLabel {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .HudValue {
      font-size: 18px;
      font-weight: 700;
      color: #8fd3ff;
    }

    #LegendPanel {
      position: absolute;
      right: 18px;
      bottom: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(5, 10, 20, 0.72);
      border: 1px solid rgba(110, 170, 255, 0.18);
      box-shadow: 0 0 18px rgba(0, 180, 255, 0.08);
      z-index: 10;
      min-width: 220px;
    }

    #LegendTitle {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .LegendRow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin: 5px 0;
      opacity: 0.92;
    }

    .LegendSwatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 14px;
      box-shadow: 0 0 10px currentColor;
    }

    #StatusBar {
      position: absolute;
      left: 18px;
      bottom: 18px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(5, 10, 20, 0.72);
      border: 1px solid rgba(110, 170, 255, 0.18);
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="AppWrapper">
    <!-- Puedes reemplazar esta imagen por tu propio mapa oscuro -->
    <img
      id="WorldMap"
      alt="Mapa mundial"
      src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
    />

    <canvas id="MapCanvas"></canvas>

    <div id="HudPanel">
      <div id="HudTitle">Cyber Hits Monitor</div>
      <div id="HudSubtitle">Visualización de eventos cargados desde JSON</div>

      <div id="HudStats">
        <div class="HudCard">
          <div class="HudLabel">Hits cargados</div>
          <div class="HudValue" id="StatHitsLoaded">0</div>
        </div>
        <div class="HudCard">
          <div class="HudLabel">Hits activos</div>
          <div class="HudValue" id="StatHitsActive">0</div>
        </div>
        <div class="HudCard">
          <div class="HudLabel">Última carga</div>
          <div class="HudValue" id="StatLastLoad" style="font-size: 13px;">--:--:--</div>
        </div>
        <div class="HudCard">
          <div class="HudLabel">Estado</div>
          <div class="HudValue" id="StatStatus" style="font-size: 13px;">Esperando</div>
        </div>
      </div>
    </div>

    <div id="LegendPanel">
      <div id="LegendTitle">Severidad</div>
      <div class="LegendRow"><span class="LegendSwatch" style="background:#38bdf8;color:#38bdf8;"></span> Baja</div>
      <div class="LegendRow"><span class="LegendSwatch" style="background:#22c55e;color:#22c55e;"></span> Media</div>
      <div class="LegendRow"><span class="LegendSwatch" style="background:#f59e0b;color:#f59e0b;"></span> Alta</div>
      <div class="LegendRow"><span class="LegendSwatch" style="background:#ef4444;color:#ef4444;"></span> Crítica</div>
    </div>

    <div id="StatusBar">Fuente: <strong>hits.json</strong></div>
  </div>

  <script>
    const oCanvas = document.getElementById("MapCanvas");
    const oContext = oCanvas.getContext("2d");

    const oStatHitsLoaded = document.getElementById("StatHitsLoaded");
    const oStatHitsActive = document.getElementById("StatHitsActive");
    const oStatLastLoad = document.getElementById("StatLastLoad");
    const oStatStatus = document.getElementById("StatStatus");

    let aHits = [];
    let aLiveAnimations = [];
    let nCanvasWidth = 0;
    let nCanvasHeight = 0;
    let nLastTimestamp = 0;

    const oConfig = {
      sJsonUrl: "hits.json",
      nRefreshMs: 5000,
      nHitLifetimeMs: 4500,
      nTrailParticles: 14,
      nMaxThickness: 3.6,
      bAutoInjectOnLoad: true
    };

    function ResizeCanvas() {
      nCanvasWidth = window.innerWidth;
      nCanvasHeight = window.innerHeight;
      oCanvas.width = nCanvasWidth;
      oCanvas.height = nCanvasHeight;
    } #ResizeCanvas

    function Clamp(nValue, nMin, nMax) {
      return Math.max(nMin, Math.min(nMax, nValue));
    } #Clamp

    function GetSeverityColor(sSeverity) {
      const sValue = String(sSeverity || "").toLowerCase();

      if (sValue === "critical" || sValue === "critica" || sValue === "crítica") {
        return "#ef4444";
      }

      if (sValue === "high" || sValue === "alta") {
        return "#f59e0b";
      }

      if (sValue === "medium" || sValue === "media") {
        return "#22c55e";
      }

      return "#38bdf8";
    } #GetSeverityColor

    function LatLonToXY(nLat, nLon) {
      const nX = ((nLon + 180) / 360) * nCanvasWidth;
      const nY = ((90 - nLat) / 180) * nCanvasHeight;

      return {
        nX,
        nY
      };
    } #LatLonToXY

    function BuildCurvePoint(oStart, oEnd, nT) {
      const nMidX = (oStart.nX + oEnd.nX) / 2;
      const nMidY = (oStart.nY + oEnd.nY) / 2;
      const nDistance = Math.hypot(oEnd.nX - oStart.nX, oEnd.nY - oStart.nY);
      const nLift = Clamp(nDistance * 0.18, 30, 160);

      const oControl = {
        nX: nMidX,
        nY: nMidY - nLift
      };

      const nOneMinusT = 1 - nT;

      const nX =
        (nOneMinusT * nOneMinusT * oStart.nX) +
        (2 * nOneMinusT * nT * oControl.nX) +
        (nT * nT * oEnd.nX);

      const nY =
        (nOneMinusT * nOneMinusT * oStart.nY) +
        (2 * nOneMinusT * nT * oControl.nY) +
        (nT * nT * oEnd.nY);

      return {
        nX,
        nY,
        oControl
      };
    } #BuildCurvePoint

    function DrawGlowPoint(nX, nY, sColor, nRadius) {
      oContext.save();

      oContext.beginPath();
      oContext.fillStyle = sColor;
      oContext.shadowBlur = nRadius * 3;
      oContext.shadowColor = sColor;
      oContext.arc(nX, nY, nRadius, 0, Math.PI * 2);
      oContext.fill();

      oContext.restore();
    } #DrawGlowPoint

    function DrawCurve(oHit, nAgeMs) {
      const oStart = LatLonToXY(oHit.source.lat, oHit.source.lon);
      const oEnd = LatLonToXY(oHit.target.lat, oHit.target.lon);
      const sColor = GetSeverityColor(oHit.severity);
      const nLifeRatio = Clamp(1 - (nAgeMs / oConfig.nHitLifetimeMs), 0, 1);
      const nThickness = Clamp((oHit.weight || 1) * 1.2, 1.2, oConfig.nMaxThickness);

      const nMidX = (oStart.nX + oEnd.nX) / 2;
      const nMidY = (oStart.nY + oEnd.nY) / 2;
      const nDistance = Math.hypot(oEnd.nX - oStart.nX, oEnd.nY - oStart.nY);
      const nLift = Clamp(nDistance * 0.18, 30, 160);
      const oControl = {
        nX: nMidX,
        nY: nMidY - nLift
      };

      oContext.save();
      oContext.beginPath();
      oContext.moveTo(oStart.nX, oStart.nY);
      oContext.quadraticCurveTo(oControl.nX, oControl.nY, oEnd.nX, oEnd.nY);
      oContext.strokeStyle = sColor;
      oContext.globalAlpha = 0.18 * nLifeRatio;
      oContext.lineWidth = nThickness + 2.5;
      oContext.shadowBlur = 16;
      oContext.shadowColor = sColor;
      oContext.stroke();

      oContext.beginPath();
      oContext.moveTo(oStart.nX, oStart.nY);
      oContext.quadraticCurveTo(oControl.nX, oControl.nY, oEnd.nX, oEnd.nY);
      oContext.strokeStyle = sColor;
      oContext.globalAlpha = 0.65 * nLifeRatio;
      oContext.lineWidth = nThickness;
      oContext.shadowBlur = 0;
      oContext.stroke();
      oContext.restore();

      DrawGlowPoint(oStart.nX, oStart.nY, sColor, 3.2);
      DrawGlowPoint(oEnd.nX, oEnd.nY, sColor, 3.2);

      const nProgress = (nAgeMs % 1500) / 1500;
      const oParticle = BuildCurvePoint(oStart, oEnd, nProgress);

      DrawGlowPoint(oParticle.nX, oParticle.nY, sColor, 4.4);
    } #DrawCurve

    function DrawHitLabels(oHit, nAgeMs) {
      const oStart = LatLonToXY(oHit.source.lat, oHit.source.lon);
      const oEnd = LatLonToXY(oHit.target.lat, oHit.target.lon);
      const nLifeRatio = Clamp(1 - (nAgeMs / oConfig.nHitLifetimeMs), 0, 1);

      oContext.save();
      oContext.globalAlpha = 0.75 * nLifeRatio;
      oContext.fillStyle = "#d7e7ff";
      oContext.font = "12px Arial";
      oContext.textBaseline = "bottom";

      if (oHit.source.name) {
        oContext.fillText(oHit.source.name, oStart.nX + 6, oStart.nY - 6);
      }

      if (oHit.target.name) {
        oContext.fillText(oHit.target.name, oEnd.nX + 6, oEnd.nY - 6);
      }

      oContext.restore();
    } #DrawHitLabels

    function RenderFrame(nTimestamp) {
      nLastTimestamp = nTimestamp;

      oContext.clearRect(0, 0, nCanvasWidth, nCanvasHeight);

      const nNow = Date.now();

      aLiveAnimations = aLiveAnimations.filter((oHit) => {
        return (nNow - oHit._nBornAt) < oConfig.nHitLifetimeMs;
      });

      for (const oHit of aLiveAnimations) {
        const nAgeMs = nNow - oHit._nBornAt;
        DrawCurve(oHit, nAgeMs);
        DrawHitLabels(oHit, nAgeMs);
      }

      oStatHitsActive.textContent = String(aLiveAnimations.length);

      requestAnimationFrame(RenderFrame);
    } #RenderFrame

    function NormalizeHit(oRawHit) {
      return {
        source: {
          name: oRawHit.source?.name || "",
          lat: Number(oRawHit.source?.lat || 0),
          lon: Number(oRawHit.source?.lon || 0)
        },
        target: {
          name: oRawHit.target?.name || "",
          lat: Number(oRawHit.target?.lat || 0),
          lon: Number(oRawHit.target?.lon || 0)
        },
        severity: oRawHit.severity || "low",
        type: oRawHit.type || "event",
        weight: Number(oRawHit.weight || 1),
        timestamp: Number(oRawHit.timestamp || Date.now())
      };
    } #NormalizeHit

    function UpdateHudAfterLoad(nCount, sStatus) {
      oStatHitsLoaded.textContent = String(nCount);
      oStatStatus.textContent = sStatus;
      oStatLastLoad.textContent = new Date().toLocaleTimeString();
    } #UpdateHudAfterLoad

    async function LoadHitsFromJson() {
      try {
        oStatStatus.textContent = "Cargando";

        const oResponse = await fetch(oConfig.sJsonUrl + "?t=" + Date.now(), {
          cache: "no-store"
        });

        if (!oResponse.ok) {
          throw new Error("No fue posible leer el JSON");
        }

        const oJsonData = await oResponse.json();
        const aIncomingHits = Array.isArray(oJsonData) ? oJsonData : (oJsonData.hits || []);

        aHits = aIncomingHits.map(NormalizeHit);

        for (const oHit of aHits) {
          aLiveAnimations.push({
            ...oHit,
            _nBornAt: Date.now()
          });
        }

        UpdateHudAfterLoad(aHits.length, "OK");
      } catch (oError) {
        console.error("Error cargando hits:", oError);
        UpdateHudAfterLoad(0, "Error");
      }
    } #LoadHitsFromJson

    function InjectDemoHits() {
      if (!oConfig.bAutoInjectOnLoad) {
        return;
      }

      const aDemoHits = [
        {
          source: { name: "Mexico City", lat: 19.4326, lon: -99.1332 },
          target: { name: "Chicago", lat: 41.8781, lon: -87.6298 },
          severity: "high",
          type: "scan",
          weight: 2,
          timestamp: Date.now()
        },
        {
          source: { name: "Tokyo", lat: 35.6762, lon: 139.6503 },
          target: { name: "Frankfurt", lat: 50.1109, lon: 8.6821 },
          severity: "critical",
          type: "exploit",
          weight: 3,
          timestamp: Date.now()
        },
        {
          source: { name: "Sao Paulo", lat: -23.5505, lon: -46.6333 },
          target: { name: "Madrid", lat: 40.4168, lon: -3.7038 },
          severity: "medium",
          type: "probe",
          weight: 1,
          timestamp: Date.now()
        }
      ];

      for (const oHit of aDemoHits) {
        aLiveAnimations.push({
          ...NormalizeHit(oHit),
          _nBornAt: Date.now()
        });
      }
    } #InjectDemoHits

    function InitApp() {
      ResizeCanvas();
      window.addEventListener("resize", ResizeCanvas);

      InjectDemoHits();
      LoadHitsFromJson();
      setInterval(LoadHitsFromJson, oConfig.nRefreshMs);

      requestAnimationFrame(RenderFrame);
    } #InitApp

    InitApp();
  </script>
</body>
</html>
